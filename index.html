<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NICKEY Fragrance</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <!-- HERO -->
  <header class="hero" id="home">

    <!-- VIDEO -->
    <video autoplay muted loop playsinline class="bg-video" preload="metadata">
      <!-- Mobile -->
      <source src="assets/video-mobile.mp4" type="video/mp4" media="(max-width: 768px)">
      <!-- Desktop -->
      <source src="assets/video-desktop2.mp4" type="video/mp4">
    </video>

    <!-- NAVBAR -->
    <nav>
      <h2 class="logo">NICKEY</h2>

      <ul class="nav-center">
        <li data-target="home">Home</li>
        <li data-target="about">Categories</li>
        <li data-target="about-bottom">About</li>
        <li data-target="product">Product</li>
        <li data-target="contact">Contact</li>
      </ul>
    </nav>

    <!-- HERO CONTENT -->
    <div class="hero-content">
      <h1 id="heroText" class="fade-text">NICKEY Fragrance</h1>
      <p>Luxury fragrance with fresh, aquatic & woody vibes</p>
      <button id="shopBtn">Shop Now</button>
    </div>

  </header>

  <!-- CATEGORIES -->
  <section id="about" class="section">
    <h2>Categories</h2>

    <div class="category-grid">

      <div class="card">
        <img src="assets/perfume.jpg">
        <h3>Perfume</h3>
      </div>

      <div class="card">
        <img src="assets/men.jpg">
        <h3>For Men</h3>
      </div>

      <div class="card">
        <img src="assets/women.jpg">
        <h3>For Women</h3>
      </div>

      <div class="card">
        <img src="assets/kids.jpg">
        <h3>Kids</h3>
      </div>

    </div>
  </section>

  <!-- PRODUCT -->
  <section id="product" class="section">
    <h2>Tersedia di</h2>

    <div class="marketplace">
      <button onclick="openLink('https://shopee.co.id/link-produk-lo')">Shopee</button>
      <button onclick="openLink('https://tokopedia.com/link-produk-lo')">Tokopedia</button>
      <button onclick="openLink('https://tiktok.com/@username/product')">TikTok Shop</button>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="section">
    <h2>Contact</h2>

    <div class="contact-buttons">
      <button id="emailBtn">Email</button>
      <button id="waBtn">WhatsApp</button>
    </div>
  </section>

  <!-- ABOUT (BOTTOM) -->
  <section id="about-bottom" class="section">
    <h2>About</h2>
    <p>Brand fragrance premium dengan vibe fresh, elegant, dan modern.</p>
  </section>

  <!-- BACK TO TOP -->
  <button id="backToTop">↑</button>

  <script src="script.js"></script>

</body>
</html>
